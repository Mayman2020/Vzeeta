<div class="public-shell">
<header class="public-header">
  <div class="header-inner">
    <a routerLink="/" class="brand">
      <span class="brand-icon"><img src="assets/brand/tabeebi-mark.svg" alt="" width="44" height="44"></span>
      <span class="brand-copy">
        <strong>{{ 'APP.BRAND' | translate }}</strong>
        <small>{{ 'APP.TAGLINE_SHORT' | translate }}</small>
      </span>
    </a>
    <nav class="nav-links">
      <a routerLink="/specialties">{{ 'NAV.SPECIALTIES' | translate }}</a>
      <button type="button" class="find-doctor-btn" (click)="openDoctorFinder()">
        <mat-icon>manage_search</mat-icon>
        {{ 'PUBLIC.FIND_DOCTOR' | translate }}
      </button>
      <button mat-icon-button type="button" class="language-btn" (click)="switchLang()" [attr.aria-label]="'COMMON.LANGUAGE' | translate">
        <mat-icon>language</mat-icon>
      </button>
      <a mat-stroked-button routerLink="/auth/login" class="login-btn">{{ 'AUTH.LOGIN' | translate }}</a>
      <a mat-flat-button color="primary" routerLink="/auth/register" class="register-btn">{{ 'AUTH.REGISTER' | translate }}</a>
    </nav>
  </div>
</header>
<main>
  <router-outlet></router-outlet>
</main>
<footer class="public-footer">
  <div class="footer-inner">
    <p>&copy; {{ 'APP.FOOTER' | translate }}</p>
  </div>
</footer>
</div>
