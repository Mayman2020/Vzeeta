spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=vzeeta_mgmt}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  flyway:
    enabled: true
    locations: classpath:db/migration
    create-schemas: true
    default-schema: vzeeta_mgmt
    schemas: vzeeta_mgmt,public
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: vzeeta_mgmt

  messages:
    basename: messages
    encoding: UTF-8

jwt:
  secret: ${JWT_SECRET:TabeebiVzeetaSecretKey2024VeryLongAndSecureKeyForJWTSigning}
  expiration: 86400000
  refresh-expiration: 604800000

user:
  default:
    password: ${USER_DEFAULT_PASSWORD:Dev@Local2026!}

vzeeta:
  platform-commission-percent: 10

server:
  port: 8081
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.vzeeta: INFO
    org.springframework.security: WARN
