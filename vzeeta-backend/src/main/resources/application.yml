spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=vzeeta_mgmt}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  flyway:
    enabled: true
    locations: classpath:db/migration
    create-schemas: true
    default-schema: vzeeta_mgmt
    schemas: vzeeta_mgmt,public
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: vzeeta_mgmt

  messages:
    basename: messages
    encoding: UTF-8

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

user:
  default:
    password: ${USER_DEFAULT_PASSWORD:Dev@Local2026!}

vzeeta:
  platform-commission-percent: 10
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@vzeeta.local}
  password-reset:
    base-url: ${PASSWORD_RESET_BASE_URL:}
  reminders:
    cron: ${REMINDER_CRON:0 0 * * * *}
    enabled: ${REMINDERS_ENABLED:true}

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:}

file:
  upload-dir: ${UPLOAD_DIR:${user.home}/.vzeeta-uploads}
  base-url: ${FILE_BASE_URL:http://localhost:8081/api/v1}

server:
  port: 8081
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
  health:
    mail:
      enabled: ${vzeeta.mail.enabled:false}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.vzeeta: INFO
    org.springframework.security: WARN
