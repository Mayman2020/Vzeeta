spring:
  config:
    activate:
      on-profile: dev
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:http://localhost:[*],http://127.0.0.1:[*]}

vzeeta:
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@vzeeta.local}
  password-reset:
    base-url: ${PASSWORD_RESET_BASE_URL:http://localhost:4202/auth/reset-password}
  reminders:
    cron: ${REMINDER_CRON:0 0 * * * *}
    enabled: ${REMINDERS_ENABLED:true}
